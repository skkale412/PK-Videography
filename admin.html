<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PK Videography Admin</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="container">

    <h1>PK Videography Admin Panel</h1>

    <button id="logoutBtn">Logout</button>

    <div class="cards">

        <div class="card">
            <h2 id="total">0</h2>
            <p>Total Bookings</p>
        </div>

        <div class="card">
            <h2 id="pending">0</h2>
            <p>Pending</p>
        </div>

        <div class="card">
            <h2 id="confirmed">0</h2>
            <p>Confirmed</p>
        </div>

        <div class="card">
            <h2 id="rejected">0</h2>
            <p>Rejected</p>
        </div>

    </div>

    <div id="bookingList"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
